name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6"
  GODOT_RELEASE: "stable"

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      # ── 2. Install Godot ─────────────────────────────────────────────────────
      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          GODOT_FILENAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
          curl -fsSL -o "${GODOT_FILENAME}.zip" \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${GODOT_FILENAME}.zip"
          unzip -q "${GODOT_FILENAME}.zip"
          mv "${GODOT_FILENAME}" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          godot --version

      # ── 3. Install export templates ──────────────────────────────────────────
      - name: Install export templates
        run: |
          TEMPLATE_DIR="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}"
          mkdir -p "${TEMPLATE_DIR}"
          TPZ="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          curl -fsSL -o "${TPZ}" \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${TPZ}"
          unzip -q "${TPZ}" -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* "${TEMPLATE_DIR}/"
          echo "=== ALL template files ==="
          ls -1 "${TEMPLATE_DIR}"
          echo "=== Android templates specifically ==="
          ls "${TEMPLATE_DIR}" | grep -i android || echo "WARNING: no android templates found!"
          echo "=== android_debug.apk present? ==="
          ls -lh "${TEMPLATE_DIR}/android_debug.apk" && echo "OK" || echo "MISSING"

      # ── 4. Set up Java 17 ────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 5. Set up Android SDK + NDK ──────────────────────────────────────────
      # Gradle build (use_gradle_build=true) needs SDK + NDK + Java.
      # NDK 27 is the latest pre-installed; Godot 4.6 works with it.
      - name: Set up Android SDK packages
        run: |
          echo "=== ANDROID_HOME: $ANDROID_HOME ==="
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses 2>&1 | tail -3
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;27.2.12479018" 2>&1 | tail -5
          echo "=== NDK installed ==="
          ls "$ANDROID_HOME/ndk/"
          NDK_PATH="$ANDROID_HOME/ndk/27.2.12479018"
          echo "NDK_PATH=$NDK_PATH" >> "$GITHUB_ENV"

      # ── 5. Disable MCP plugin for CI ─────────────────────────────────────────
      - name: Disable MCP plugin for CI
        run: |
          sed -i '/godot_mcp/d' project.godot
          sed -i '/\[editor_plugins\]/{ n; /^$/d }' project.godot

      # ── 7. Import project assets ─────────────────────────────────────────────
      - name: Import project assets
        run: godot --headless --editor --quit 2>&1 || true

      # ── 7. Inject Android settings into editor settings ──────────────────────
      # Godot creates editor_settings-4.6.tres during the import step.
      # We patch/append SDK, NDK, and Java paths so they survive into export.
      - name: Set Android paths in editor settings
        run: |
          SETTINGS="$HOME/.config/godot/editor_settings-4.6.tres"
          [ -f "$SETTINGS" ] || { mkdir -p "$(dirname "$SETTINGS")"; printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\n' > "$SETTINGS"; }
          # Remove stale lines and re-append correct values
          sed -i '/export\/android\/android_sdk_path/d' "$SETTINGS"
          sed -i '/export\/android\/android_ndk_path/d' "$SETTINGS"
          sed -i '/export\/android\/java_sdk_path/d' "$SETTINGS"
          printf '%s\n' \
            "export/android/android_sdk_path = \"$ANDROID_HOME\"" \
            "export/android/android_ndk_path = \"$NDK_PATH\"" \
            "export/android/java_sdk_path = \"$JAVA_HOME\"" \
            >> "$SETTINGS"
          echo "=== Android settings in file ==="
          grep "export/android" "$SETTINGS"
          echo "=== editor settings (after patch) ==="
          cat "$SETTINGS"

      # ── 8. Ensure debug keystore exists ─────────────────────────────────────
      # Godot headless writes the keystore path to editor settings but never
      # actually creates the file. Without it the export validator fails silently.
      - name: Ensure debug keystore exists
        run: |
          KEYSTORE_DIR="$HOME/.local/share/godot/keystores"
          KEYSTORE_PATH="$KEYSTORE_DIR/debug.keystore"
          mkdir -p "$KEYSTORE_DIR"
          if [ -f "$KEYSTORE_PATH" ]; then
            echo "Keystore already exists: $(ls -lh "$KEYSTORE_PATH")"
          else
            echo "Keystore missing — generating..."
            keytool -genkey -v -keystore "$KEYSTORE_PATH" \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "C=US, O=Android, CN=Android Debug"
            echo "Keystore created: $(ls -lh "$KEYSTORE_PATH")"
          fi

      # ── 9. Export debug APK ───────────────────────────────────────────────────
      - name: Export debug APK
        run: |
          TEMPLATE_DIR="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}"
          echo "=== android_debug.apk at export time ==="
          ls -lh "${TEMPLATE_DIR}/android_debug.apk" && echo "TEMPLATE OK" || echo "TEMPLATE MISSING"
          echo "=== debug keystore ==="
          ls -lh "$HOME/.local/share/godot/keystores/debug.keystore" && echo "KEYSTORE OK" || echo "KEYSTORE MISSING"
          echo "=== build-tools ==="
          ls "$ANDROID_HOME/build-tools/"
          mkdir -p build/android
          godot --headless --verbose --export-debug "Android" "$PWD/build/android/Lungiman-debug.apk" 2>&1

      # ── 9. Upload APK artifact ────────────────────────────────────────────────
      # Download from the Actions run page → Artifacts section.
      # Enable "Install unknown apps" on your phone and sideload directly.
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lungiman-debug-${{ github.sha }}
          path: build/android/Lungiman-debug.apk
          retention-days: 30
