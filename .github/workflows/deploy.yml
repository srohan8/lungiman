name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  GODOT_VERSION: "4.6"
  GODOT_RELEASE: "stable"

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  export-web:
    name: Export & Deploy Web Build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      # ── 2. Install Godot ─────────────────────────────────────────────────────
      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          GODOT_FILENAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
          curl -fsSL -o "${GODOT_FILENAME}.zip" \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${GODOT_FILENAME}.zip"
          unzip -q "${GODOT_FILENAME}.zip"
          mv "${GODOT_FILENAME}" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          godot --version

      # ── 3. Install export templates ──────────────────────────────────────────
      - name: Install export templates
        run: |
          TEMPLATE_DIR="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}"
          mkdir -p "${TEMPLATE_DIR}"
          TPZ="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          curl -fsSL -o "${TPZ}" \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${TPZ}"
          unzip -q "${TPZ}" -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* "${TEMPLATE_DIR}/"
          echo "=== Installed templates ==="
          ls "${TEMPLATE_DIR}"
          echo "=== Version ==="
          cat "${TEMPLATE_DIR}/version.txt"
          echo "=== Web templates ==="
          ls "${TEMPLATE_DIR}" | grep web || echo "WARNING: no web templates found!"

      # ── 4. Strip MCP plugin for CI ───────────────────────────────────────────
      # The godot_mcp editor plugin tries to connect to a local WebSocket server
      # that doesn't exist in CI. Leaving it active during headless export can
      # stall the export pipeline. We strip it from project.godot for this run
      # only — the file is never committed back.
      - name: Disable MCP plugin for CI
        run: |
          sed -i '/godot_mcp/d' project.godot
          sed -i '/\[editor_plugins\]/{ n; /^$/d }' project.godot
          echo "project.godot after strip:"
          grep -A2 "editor_plugins" project.godot || echo "(editor_plugins section removed)"

      # ── 5. Import project assets ─────────────────────────────────────────────
      - name: Import project assets
        run: godot --headless --editor --quit 2>&1 || true

      # ── 6. Export ────────────────────────────────────────────────────────────
      - name: Export Web build
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html 2>&1

      # ── 7. Inject CORS service worker ────────────────────────────────────────
      - name: Inject CORS service worker
        run: |
          cp web/coi-serviceworker.js build/web/coi-serviceworker.js
          SW_SNIPPET='<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("coi-serviceworker.js").then(r=>{if(!navigator.serviceWorker.controller)location.reload()})}</script>'
          sed -i "s|</head>|${SW_SNIPPET}\n</head>|" build/web/index.html

      # ── 8. Add .nojekyll ─────────────────────────────────────────────────────
      - name: Add .nojekyll
        run: touch build/web/.nojekyll

      # ── 9. Upload artifact ───────────────────────────────────────────────────
      # Uploads directly to GitHub Pages storage — no git commit, no 100 MB limit.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      # ── 10. Deploy ───────────────────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
