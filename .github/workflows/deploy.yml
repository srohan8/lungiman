name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6"
  GODOT_RELEASE: "stable"

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      # ── 2. Install Godot ─────────────────────────────────────────────────────
      - name: Install Godot ${{ env.GODOT_VERSION }}
        run: |
          GODOT_FILENAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
          curl -fsSL -o "${GODOT_FILENAME}.zip" \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${GODOT_FILENAME}.zip"
          unzip -q "${GODOT_FILENAME}.zip"
          mv "${GODOT_FILENAME}" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          godot --version

      # ── 3. Install export templates ──────────────────────────────────────────
      - name: Install export templates
        run: |
          TEMPLATE_DIR="${HOME}/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}"
          mkdir -p "${TEMPLATE_DIR}"
          TPZ="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          curl -fsSL -o "${TPZ}" \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${TPZ}"
          unzip -q "${TPZ}" -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* "${TEMPLATE_DIR}/"
          echo "=== Android templates ==="
          ls "${TEMPLATE_DIR}" | grep android || echo "WARNING: no android templates found!"

      # ── 4. Set up Android SDK ────────────────────────────────────────────────
      # ubuntu-latest has Android SDK pre-installed at $ANDROID_HOME.
      # We just need platforms;android-34 and build-tools for APK signing.
      - name: Set up Android SDK packages
        run: |
          echo "Android SDK: $ANDROID_HOME"
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            2>/dev/null | grep -E "^(Installed|Nothing|Warning)" || true

      # ── 5. Configure Godot editor settings (Android SDK path) ────────────────
      - name: Configure Godot Android editor settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << EOF
[gd_resource type="EditorSettings" format=3]

[resource]
export/android/android_sdk_path = "$ANDROID_HOME"
export/android/debug_keystore = ""
export/android/debug_keystore_user = "androiddebugkey"
export/android/debug_keystore_pass = "android"
EOF

      # ── 6. Disable MCP plugin for CI ─────────────────────────────────────────
      - name: Disable MCP plugin for CI
        run: |
          sed -i '/godot_mcp/d' project.godot
          sed -i '/\[editor_plugins\]/{ n; /^$/d }' project.godot

      # ── 7. Import project assets ─────────────────────────────────────────────
      - name: Import project assets
        run: godot --headless --editor --quit 2>&1 || true

      # ── 8. Export debug APK ───────────────────────────────────────────────────
      - name: Export debug APK
        run: |
          mkdir -p build/android
          godot --headless --export-debug "Android" "$PWD/build/android/Lungiman-debug.apk" 2>&1

      # ── 9. Upload APK artifact ────────────────────────────────────────────────
      # Download from the workflow run page → Artifacts section.
      # The APK is a debug build — enable "Install unknown apps" on your phone
      # and sideload it directly (no Play Store needed).
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lungiman-debug-${{ github.sha }}
          path: build/android/Lungiman-debug.apk
          retention-days: 30
